<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DevourX.io</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d2b15; overflow:hidden; font-family:'Nunito',sans-serif; user-select:none; }
canvas { display:block; position:fixed; inset:0; }
.screen { position:fixed; inset:0; z-index:50; display:none; }
.screen.active { display:flex; }
#menuScreen { flex-direction:column; align-items:center; justify-content:flex-start; background:radial-gradient(ellipse 100% 80% at 50% 0%, #1e5e30 0%, #0a1f10 60%, #050e08 100%); }
.top-bar { width:100%; display:flex; justify-content:center; align-items:flex-start; padding:80px 24px 0; position:relative; }
.logo-wrap { display:flex; flex-direction:column; align-items:center; pointer-events:none; }
.logo { font-family:'Fredoka One',cursive; font-size:88px; line-height:1; letter-spacing:2px; animation:lp 3s ease-in-out infinite; filter:drop-shadow(0 0 35px #39ff1455) drop-shadow(0 6px 0 #07200d); }
.logo .ld{color:#ff4e4e}.logo .le{color:#ff9f43}.logo .lv{color:#f9ca24}.logo .lo{color:#2ecc71}.logo .lu{color:#00e5cc}.logo .lr{color:#a29bfe}.logo .lx{color:#ff6b9d}.logo .lio{color:#fff;font-size:54px;vertical-align:middle}
@keyframes lp{0%,100%{filter:drop-shadow(0 0 30px #39ff1455) drop-shadow(0 6px 0 #07200d)}50%{filter:drop-shadow(0 0 60px #39ff14aa) drop-shadow(0 6px 0 #07200d)}}
.tip { color:#a8d8b8; font-size:14px; font-weight:700; margin-top:6px; opacity:.8; min-height:20px; }
.menu-center { display:flex; flex-direction:column; align-items:center; gap:11px; margin-top:80px; width:420px; }
.coins-fixed { position:fixed; top:14px; right:14px; display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.55); border:2px solid rgba(249,202,36,0.5); border-radius:50px; padding:6px 16px 6px 10px; z-index:999; }
.name-row { display:flex; gap:8px; width:100%; }
.name-input { flex:1; background:rgba(255,255,255,0.93); border:none; border-radius:50px; padding:13px 24px; font-size:20px; font-family:'Nunito',sans-serif; font-weight:800; color:#1a4a25; outline:none; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
.btn-play { background:linear-gradient(180deg,#4af078 0%,#20c44a 45%,#178a34 100%); border:none; border-radius:60px; color:#fff; font-family:'Fredoka One',cursive; font-size:34px; letter-spacing:3px; padding:17px 0; width:100%; cursor:pointer; box-shadow:0 6px 0 #0e5a22,0 10px 28px rgba(46,204,113,0.4); transition:transform .1s; text-shadow:0 2px 4px rgba(0,0,0,0.25); }
.btn-play:hover{transform:translateY(-3px)} .btn-play:active{transform:translateY(3px)}
.btn-skins { background:linear-gradient(180deg,#ff9f43 0%,#e67e22 50%,#ca6f1e 100%); border:none; border-radius:60px; color:#fff; font-family:'Fredoka One',cursive; font-size:28px; letter-spacing:3px; padding:15px 0; width:100%; cursor:pointer; box-shadow:0 6px 0 #a04000; transition:transform .1s; text-shadow:0 2px 4px rgba(0,0,0,0.25); }
.btn-skins:hover{transform:translateY(-3px)} .btn-skins:active{transform:translateY(3px)}
.btn-quests-menu { background:linear-gradient(180deg,#f9ca24 0%,#e67e22 100%); border:none; border-radius:60px; color:#fff; font-family:'Fredoka One',cursive; font-size:22px; letter-spacing:2px; padding:13px 0; width:100%; cursor:pointer; box-shadow:0 5px 0 #a04000; transition:transform .1s; }
.btn-quests-menu:hover{transform:translateY(-2px)}

/* ═══ ЭКРАН ЗАГРУЗКИ ═══ */
#loadingScreen { flex-direction:column; align-items:center; justify-content:center; background:radial-gradient(ellipse 100% 80% at 50% 0%, #1e5e30 0%, #0a1f10 60%, #050e08 100%); gap:28px; }
.load-logo { font-family:'Fredoka One',cursive; font-size:72px; line-height:1; filter:drop-shadow(0 0 40px #39ff1488); }
.load-logo .ld{color:#ff4e4e}.load-logo .le{color:#ff9f43}.load-logo .lv{color:#f9ca24}.load-logo .lo{color:#2ecc71}.load-logo .lu{color:#00e5cc}.load-logo .lr{color:#a29bfe}.load-logo .lx{color:#ff6b9d}
.load-spinner-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
.load-bar-bg { width:260px; height:10px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; border:1px solid rgba(46,204,113,0.3); }
.load-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,#2ecc71,#39ff14); border-radius:10px; transition:width .4s ease; }
.load-status { font-family:'Fredoka One',cursive; font-size:18px; color:#a8d8b8; letter-spacing:2px; }
.load-dots { display:inline-block; animation:dots 1.2s infinite; }
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

#skinsScreen { flex-direction:column; align-items:center; background:radial-gradient(ellipse 100% 70% at 50% 0%,#1e2060 0%,#090b1a 60%,#040509 100%); }
.sk-header { width:100%; display:flex; align-items:center; justify-content:space-between; padding:20px 28px; }
.sk-title { font-family:'Fredoka One',cursive; font-size:44px; color:#a29bfe; }
.back-btn { background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2); border-radius:50px; color:#fff; font-family:'Fredoka One',cursive; font-size:18px; padding:9px 22px; cursor:pointer; }
.back-btn:hover{background:rgba(255,255,255,0.2)}
.sk-cats { display:flex; gap:10px; margin-bottom:18px; }
.cat-btn { background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.13); border-radius:50px; color:#aaa; font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; padding:7px 20px; cursor:pointer; }
.cat-btn.active { background:rgba(162,155,254,0.2); border-color:#a29bfe; color:#a29bfe; }
.skins-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; width:88%; max-width:860px; overflow-y:auto; max-height:58vh; padding:4px; }
.skin-card { background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.1); border-radius:18px; padding:16px 10px; display:flex; flex-direction:column; align-items:center; gap:9px; cursor:pointer; transition:all .15s; position:relative; }
.skin-card:hover{transform:translateY(-4px)}
.skin-card.selected{border-color:#f9ca24;background:rgba(249,202,36,0.1);box-shadow:0 0 22px rgba(249,202,36,0.3)}
.skin-card.locked{filter:brightness(0.45)}
.skin-preview { width:58px; height:58px; border-radius:50%; box-shadow:0 4px 14px rgba(0,0,0,0.5); }
.sk-name { font-size:12px; font-weight:800; text-align:center; }
.sk-cost { background:rgba(249,202,36,0.18); border:1px solid rgba(249,202,36,0.35); border-radius:20px; padding:3px 10px; font-size:12px; font-weight:800; color:#f9ca24; }
.sk-equip { font-size:11px; font-weight:800; color:#2ecc71; letter-spacing:1px; text-transform:uppercase; }
.lock-ico { position:absolute; top:9px; right:9px; font-size:15px; }
.rarity-bar { position:absolute; bottom:0; left:0; right:0; height:3px; border-radius:0 0 16px 16px; }
.essence-badge { background:#1a4a25; border:3px solid #2ecc71; border-radius:50px; padding:6px 16px 6px 10px; display:flex; align-items:center; gap:8px; }
.ess-cnt { font-family:'Fredoka One',cursive; font-size:22px; color:#2ecc71; }
#hud { position:fixed; inset:0; z-index:10; pointer-events:none; display:none; }
.leaderboard { position:absolute; top:16px; right:16px; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); border:1px solid rgba(46,204,113,0.2); border-radius:16px; padding:12px 16px; min-width:180px; }
.lb-title { font-family:'Fredoka One',cursive; color:#2ecc71; font-size:13px; letter-spacing:2px; text-align:center; margin-bottom:8px; }
.lb-row { display:flex; align-items:center; padding:3px 0; font-size:12px; font-weight:700; color:#d4f5e9; border-bottom:1px solid rgba(255,255,255,0.04); }
.lb-row:last-child{border:none} .lb-row.me{color:#f9ca24}
.lb-rank{color:rgba(255,255,255,0.3);width:18px;font-size:11px}
.lb-name{flex:1;padding:0 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:88px}
.lb-score{color:#2ecc71;font-family:'Fredoka One',cursive}
.hud-bottom { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:10px; }
.hud-stat { background:rgba(0,0,0,0.55); backdrop-filter:blur(6px); border:1px solid rgba(46,204,113,0.18); border-radius:12px; padding:7px 16px; text-align:center; }
.hud-lbl { color:rgba(168,230,192,0.6); font-size:10px; font-weight:800; letter-spacing:2px; text-transform:uppercase; }
.hud-val { color:#fff; font-family:'Fredoka One',cursive; font-size:22px; }
.ap-btn { position:absolute; bottom:20px; left:16px; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); border:2px solid rgba(0,229,204,0.35); border-radius:16px; padding:10px 14px; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; pointer-events:all; transition:border-color .2s, background .2s; }
.ap-btn:hover { background:rgba(0,229,204,0.15); border-color:#00e5cc; }
.ap-btn.active { background:rgba(0,229,204,0.2); border-color:#00e5cc; box-shadow:0 0 18px rgba(0,229,204,0.4); }
.ap-btn span { color:#00e5cc; font-family:'Fredoka One',cursive; font-size:12px; letter-spacing:1px; }
.minimap-c { position:absolute; bottom:16px; right:16px; width:108px; height:108px; background:rgba(0,0,0,0.5); border:1px solid rgba(46,204,113,0.2); border-radius:10px; overflow:hidden; }
#xpBarWrap { position:fixed; top:14px; left:14px; z-index:100; display:block; pointer-events:none; }
#xpWidget { display:flex; align-items:center; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.7)); }
#xpLvlBubble { background:linear-gradient(135deg,#1a6fd4,#0a3d8f); border:3px solid #4db8ff; border-radius:50%; width:52px; height:52px; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2; box-shadow:0 0 14px rgba(77,184,255,0.5); }
#xpLvlBubble .xp-lv-lbl { font-size:9px; font-weight:900; color:#9fd4ff; text-transform:uppercase; letter-spacing:1px; line-height:1; }
#xpLvlBubble .xp-lv-num { font-family:'Fredoka One',cursive; font-size:20px; color:#fff; line-height:1; }
#xpBarBox { background:linear-gradient(180deg,#1a3a6e,#0d1f3c); border:2px solid #2a5aaa; border-left:none; border-radius:0 10px 10px 0; padding:5px 10px 5px 8px; width:120px; margin-left:-4px; }
#xpBarTrack { background:rgba(0,0,0,0.4); border:1px solid rgba(77,184,255,0.3); border-radius:10px; height:10px; margin-top:3px; overflow:hidden; }
#xpBarFill { height:100%; background:linear-gradient(90deg,#4db8ff,#1a6fd4); border-radius:10px; transition:width .4s ease; width:0%; }
#xpBarBox .xp-nums { font-size:10px; font-weight:800; color:#6aa8e0; margin-top:2px; text-align:right; }
#lvlUpBanner { position:fixed; top:30%; left:50%; transform:translateX(-50%) scale(0); z-index:80; background:linear-gradient(135deg,#6c5ce7,#a29bfe); border-radius:24px; padding:18px 44px; text-align:center; pointer-events:none; transition:transform .25s cubic-bezier(.175,.885,.32,1.275), opacity .3s; opacity:0; }
#lvlUpBanner .lup-title { font-family:'Fredoka One',cursive; font-size:38px; color:#fff; }
#activePowerup { position:fixed; top:16px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); border:2px solid #f9ca24; border-radius:50px; padding:6px 20px; font-family:'Fredoka One',cursive; font-size:16px; color:#f9ca24; display:none; z-index:20; gap:8px; align-items:center; }
#activePowerup .pu-timer { font-size:14px; color:#fff; }
#questsBtn { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.55); border:2px solid rgba(255,200,0,0.5); border-radius:50px; padding:7px 16px; display:flex; align-items:center; gap:8px; cursor:pointer; z-index:100; pointer-events:all !important; }
#questsBtn .q-lbl { font-family:'Fredoka One',cursive; font-size:14px; color:#f9ca24; }
#questsBadge { background:#e74c3c; border-radius:50%; width:18px; height:18px; font-size:11px; font-weight:900; color:#fff; display:none; align-items:center; justify-content:center; }
#questsPanel { position:fixed; bottom:150px; left:50%; transform:translateX(-50%); background:rgba(10,20,14,0.96); border:2px solid rgba(255,200,0,0.35); border-radius:20px; padding:16px; width:280px; z-index:100; display:none; flex-direction:column; gap:10px; pointer-events:all !important; }
#questsPanel .qp-title { font-family:'Fredoka One',cursive; font-size:20px; color:#f9ca24; text-align:center; margin-bottom:4px; }
.quest-item { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:10px 12px; }
.quest-name { font-size:13px; font-weight:800; color:#e8f5e9; margin-bottom:5px; }
.quest-bar-bg { background:rgba(255,255,255,0.1); border-radius:10px; height:6px; }
.quest-bar-fill { height:100%; border-radius:10px; background:linear-gradient(90deg,#f9ca24,#ff9f43); transition:width .4s; }
.quest-prog { font-size:11px; color:#aaa; margin-top:3px; display:flex; justify-content:space-between; }
.quest-done { font-size:11px; color:#2ecc71; font-weight:800; }
#toastWrap { position:fixed; top:80px; left:50%; transform:translateX(-50%); z-index:90; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; }
.toast { background:rgba(0,0,0,0.85); border:1px solid rgba(255,255,255,0.15); border-radius:50px; padding:8px 22px; font-family:'Fredoka One',cursive; font-size:16px; color:#fff; animation:toastIn .3s ease, toastOut .4s ease 1.8s forwards; white-space:nowrap; }
@keyframes toastIn { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
@keyframes toastOut { to{opacity:0;transform:translateY(-10px)} }
#joystickWrap { position:fixed; bottom:110px; left:20px; z-index:20; display:none; touch-action:none; }
#joystickBase { width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,0.12); border:3px solid rgba(255,255,255,0.35); display:flex; align-items:center; justify-content:center; position:relative; }
#joystickKnob { width:66px; height:66px; border-radius:50%; background:radial-gradient(circle at 35% 35%, rgba(255,255,255,0.95), rgba(180,180,180,0.7)); box-shadow:0 6px 20px rgba(0,0,0,0.5); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
#boostBtn { position:fixed; bottom:110px; right:20px; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #4af078, #178a34); border:4px solid rgba(255,255,255,0.4); box-shadow:0 6px 28px rgba(46,204,113,0.6); z-index:20; display:none; align-items:center; justify-content:center; font-family:'Fredoka One',cursive; font-size:18px; color:#fff; touch-action:none; }
.death-records { margin:10px 0 18px; width:min(90vw,320px); }
.death-records .rec-title { font-family:'Fredoka One',cursive; font-size:16px; color:#a8e6c0; text-align:center; margin-bottom:8px; letter-spacing:2px; }
.rec-row { display:flex; align-items:center; padding:5px 12px; border-radius:10px; font-size:13px; font-weight:800; color:#d4f5e9; background:rgba(255,255,255,0.04); margin-bottom:3px; }
.rec-row.new { background:rgba(249,202,36,0.12); color:#f9ca24; }
.rec-pos { width:22px; color:rgba(255,255,255,0.35); font-size:12px; }
.rec-score { flex:1; font-family:'Fredoka One',cursive; font-size:15px; }
.rec-medal { font-size:16px; margin-left:4px; }
#deathScreen { flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.82); backdrop-filter:blur(10px); }
.death-title { font-family:'Fredoka One',cursive; font-size:80px; color:#ff4e4e; filter:drop-shadow(0 0 40px #ff4e4e88); }
.death-sub { color:#a8e6c0; font-size:18px; font-weight:700; margin-top:4px; }
.death-score { font-family:'Fredoka One',cursive; font-size:46px; color:#f9ca24; margin:16px 0 26px; }
.btn-restart { background:linear-gradient(135deg,#e74c3c,#ff6b6b); border:none; border-radius:60px; color:#fff; font-family:'Fredoka One',cursive; font-size:28px; padding:15px 58px; cursor:pointer; box-shadow:0 6px 28px rgba(231,76,60,0.5); }
.btn-restart:hover{transform:scale(1.05)}
.btn-back-menu { background:transparent; border:2px solid rgba(255,255,255,0.28); border-radius:60px; color:#fff; font-family:'Fredoka One',cursive; font-size:20px; padding:11px 38px; cursor:pointer; margin-top:12px; }
.btn-back-menu:hover{background:rgba(255,255,255,0.09)}
#onlineCounter { position:fixed; top:22px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.7); font-family:'Nunito',sans-serif; font-weight:800; font-size:14px; z-index:200; pointer-events:none; letter-spacing:1px; }
#onlineCounter span { color:#fff; font-weight:900; }
.btn-top { position:fixed; bottom:18px; left:18px; background:rgba(0,0,0,0.65); border:2px solid rgba(249,150,0,0.5); border-radius:18px; padding:10px 16px 8px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; z-index:100; pointer-events:all; transition:all .18s; }
.btn-top:hover { background:rgba(249,150,0,0.15); border-color:#f9a000; transform:translateY(-2px); }
.btn-top .bt-icon { font-size:24px; line-height:1; }
.btn-top .bt-lbl { font-family:'Fredoka One',cursive; font-size:13px; background:linear-gradient(90deg,#f9ca24,#ff9f43); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:1px; }
#topPanel { position:fixed; bottom:90px; left:18px; background:rgba(8,14,10,0.97); border:2px solid rgba(249,150,0,0.35); border-radius:22px; padding:18px 16px; width:260px; max-height:70vh; overflow-y:auto; z-index:101; display:none; flex-direction:column; gap:6px; pointer-events:all; }
.top-panel-title { font-family:'Fredoka One',cursive; font-size:20px; text-align:center; background:linear-gradient(90deg,#f9ca24,#ff9f43); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
.top-row { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); }
.top-row.gold { background:rgba(249,202,36,0.1); border-color:rgba(249,202,36,0.3); }
.top-row.silver { background:rgba(192,192,192,0.1); border-color:rgba(192,192,192,0.25); }
.top-row.bronze { background:rgba(205,127,50,0.1); border-color:rgba(205,127,50,0.25); }
.top-medal { font-size:20px; width:28px; text-align:center; flex-shrink:0; }
.top-medal-num { font-family:'Fredoka One',cursive; font-size:11px; display:block; line-height:1; margin-top:-3px; text-align:center; }
.top-name { flex:1; font-size:13px; font-weight:800; color:#e8f5e9; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.top-score { font-family:'Fredoka One',cursive; font-size:16px; color:#f9ca24; flex-shrink:0; }
.top-empty { text-align:center; color:rgba(255,255,255,0.3); font-size:13px; font-weight:700; padding:20px 0; }
</style>
</head>
<body>

<!-- МЕНЮ -->
<div id="menuScreen" class="screen active">
  <div class="top-bar">
    <div class="logo-wrap">
      <div class="logo"><span class="ld">D</span><span class="le">e</span><span class="lv">v</span><span class="lo">o</span><span class="lu">u</span><span class="lr">r</span><span class="lx">X</span><span class="lio">.io</span></div>
      <div class="tip" id="tipEl">Заставь врага врезаться в твой хвост — победа!</div>
    </div>
  </div>
  <div class="menu-center">
    <div class="name-row">
      <input class="name-input" id="nameInput" placeholder="Введи ник..." maxlength="16" value="Player">
    </div>
    <button class="btn-play" id="playBtn">ИГРАТЬ</button>
    <button class="btn-skins" id="skinsMenuBtn">СКИНЫ</button>
    <button class="btn-quests-menu" id="questsMenuBtn">ЗАДАНИЯ</button>
  </div>
</div>

<!-- ЗАГРУЗКА -->
<div id="loadingScreen" class="screen">
  <div class="load-logo">
    <span class="ld">D</span><span class="le">e</span><span class="lv">v</span><span class="lo">o</span><span class="lu">u</span><span class="lr">r</span><span class="lx">X</span>
  </div>
  <div class="load-spinner-wrap">
    <div class="load-bar-bg"><div class="load-bar-fill" id="loadBarFill"></div></div>
    <div class="load-status" id="loadStatus">Подключение<span class="load-dots" id="loadDots"></span></div>
  </div>
</div>

<!-- СКИНЫ -->
<div id="skinsScreen" class="screen">
  <div class="sk-header">
    <div class="sk-title">Скины</div>
    <div style="display:flex;align-items:center;gap:14px">
      <div class="essence-badge"><span class="ess-cnt" id="essCnt2">0</span> 🪙</div>
      <button class="back-btn" id="skinsBack">Назад</button>
    </div>
  </div>
  <div class="sk-cats" id="skCats">
    <button class="cat-btn active" data-cat="all">Все</button>

<script>
// ══════ SKINS ══════
const SKINS_DATA=[
  {id:0,name:'Зелёный',h:'#27ae60',b:['#2ecc71','#27ae60'],rarity:'standard',cost:0,owned:true},
  {id:1,name:'Красный',h:'#c0392b',b:['#e74c3c','#c0392b'],rarity:'standard',cost:0,owned:true},
  {id:2,name:'Синий',h:'#1a6fa8',b:['#3498db','#1a6fa8'],rarity:'standard',cost:0,owned:true},
  {id:3,name:'Золотой',h:'#c9a007',b:['#f9ca24','#c9a007'],rarity:'rare',cost:50,owned:false},
  {id:4,name:'Фиолет',h:'#6c3483',b:['#a29bfe','#6c3483'],rarity:'rare',cost:80,owned:false},
  {id:5,name:'Розовый',h:'#a93226',b:['#ff6b9d','#a93226'],rarity:'rare',cost:100,owned:false},
  {id:6,name:'Бирюза',h:'#0e8578',b:['#00e5cc','#0e8578'],rarity:'rare',cost:120,owned:false},
  {id:7,name:'Оранжевый',h:'#ca6f1e',b:['#ff9f43','#ca6f1e'],rarity:'rare',cost:100,owned:false},
  {id:8,name:'Огонь',h:'#7b241c',b:['#ff4e4e','#7b241c'],rarity:'legendary',cost:400,owned:false},
  {id:9,name:'Лёд',h:'#1a5276',b:['#85c1e9','#1a5276'],rarity:'legendary',cost:450,owned:false},
  {id:10,name:'Неон',h:'#0b5345',b:['#39ff14','#0b5345'],rarity:'legendary',cost:500,owned:false},
  {id:11,name:'Галактика',h:'#4a235a',b:['#d7bde2','#4a235a'],rarity:'legendary',cost:600,owned:false},
  {id:12,name:'Тьма',h:'#1c1c2e',b:['#40407a','#1c1c2e'],rarity:'legendary',cost:700,owned:false},
  {id:13,name:'Золото X',h:'#7d6608',b:['#ffd700','#7d6608'],rarity:'legendary',cost:900,owned:false},
  {id:14,name:'Радуга',h:'#922b21',b:['#f9ca24','#1abc9c'],rarity:'legendary',cost:1200,owned:false},
  {id:15,name:'Тёмный X',h:'#0a0a0a',b:['#2c2c2c','#0a0a0a'],rarity:'legendary',cost:2000,owned:false},
];
const RARITY_C={standard:'#a8d8b8',rare:'#a29bfe',legendary:'#f9ca24'};

(function loadSavedSkins(){
  const saved=JSON.parse(localStorage.getItem('dvx_skins')||'null');
  if(saved){saved.forEach(s=>{const skin=SKINS_DATA.find(x=>x.id===s.id);if(skin)skin.owned=s.owned;});}
})();

let selSkin=(()=>{const s=localStorage.getItem('dvx_selSkin');return s!==null?parseInt(s):0;})();
let essence=parseInt(localStorage.getItem('dvx_coins')||'18'),curCat='all';
const MIN_LEN=10,MAX_BODY=750;

function syncEss(){localStorage.setItem('dvx_coins',essence);document.getElementById('essCnt').textContent=essence;document.getElementById('essCnt2').textContent=essence;}
function saveSkins(){localStorage.setItem('dvx_skins',JSON.stringify(SKINS_DATA.map(s=>({id:s.id,owned:s.owned}))));localStorage.setItem('dvx_selSkin',selSkin);}
syncEss();

function renderSkins(){
  const grid=document.getElementById('skinsGrid');grid.innerHTML='';
  const list=curCat==='all'?SKINS_DATA:SKINS_DATA.filter(s=>s.rarity===curCat);
  list.forEach(s=>{
    const locked=!s.owned,card=document.createElement('div');
    card.className='skin-card'+(s.id===selSkin?' selected':'')+(locked?' locked':'');
    const rc=RARITY_C[s.rarity];
    card.innerHTML=`${locked?'<span class="lock-ico">🔒</span>':''}<div class="skin-preview" style="background:linear-gradient(135deg,${s.b[0]},${s.b[1]})"></div><div class="sk-name" style="color:${rc}">${s.name}</div>${locked?`<div class="sk-cost">🪙 ${s.cost}</div>`:(s.id===selSkin?'<div class="sk-equip">Надет</div>':'<div class="sk-equip" style="color:#888">Надеть</div>')}<div class="rarity-bar" style="background:${rc}55"></div>`;
    card.onclick=()=>{
      if(locked){if(essence>=s.cost){essence-=s.cost;s.owned=true;selSkin=s.id;syncEss();saveSkins();renderSkins();}else alert('Нужно '+s.cost+' монет');return;}
      selSkin=s.id;saveSkins();renderSkins();
    };
    grid.appendChild(card);
  });
}
document.getElementById('skCats').addEventListener('click',e=>{
  const btn=e.target.closest('.cat-btn');if(!btn)return;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');curCat=btn.dataset.cat;renderSkins();
});

const TIPS=['Зажми ЛКМ — ускорение!','Заставь врага врезаться в хвост!','Убивай ботов — монеты!','Минимум 10 массы для ускорения','A — автопилот'];
let tipI=0;setInterval(()=>{tipI=(tipI+1)%TIPS.length;document.getElementById('tipEl').textContent=TIPS[tipI];},4000);

// ══════ SCREENS ══════
function showMenu(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('menuScreen').classList.add('active');
  document.getElementById('hud').style.display='none';
  document.getElementById('xpBarWrap').style.display='block';
  document.getElementById('questsBtn').style.display='none';
  document.getElementById('topBtn').style.display='flex';
  showJoystick(false);
  updateXPBar();
}
function showSkins(){renderSkins();document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('skinsScreen').classList.add('active');}
function showLoading(status='Подключение'){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('loadingScreen').classList.add('active');
  setLoadStatus(status,0);
}
function setLoadStatus(text,pct){
  document.getElementById('loadStatus').innerHTML=text+'<span class="load-dots"></span>';
  const fill=document.getElementById('loadBarFill');
  if(fill)fill.style.width=pct+'%';
}

document.getElementById('skinsMenuBtn').onclick=showSkins;
document.getElementById('skinsBack').onclick=showMenu;

// ══════ CANVAS ══════
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const mc=document.getElementById('minimap');
const mctx=mc.getContext('2d');
mc.width=108;mc.height=108;
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

const WORLD=12000,CELL=22;
let serverWorld=null,player=null,running=false;
let camX=0,camY=0,boosting=false,pname='Player';
let autopilotMode=false;

// ══════ СЕРВЕР ══════
const SERVER='wss://devourx-server-production.up.railway.app';
let ws=null,wsConnecting=false;

function connectWS(){
  if(wsConnecting)return;
  wsConnecting=true;
  serverWorld=null;
  if(ws){try{ws.close();}catch(e){}ws=null;}

  showLoading('Подключение');
  let loadPct=0;
  const loadInterval=setInterval(()=>{
    loadPct=Math.min(loadPct+3,85);
    document.getElementById('loadBarFill').style.width=loadPct+'%';
  },100);

  ws=new WebSocket(SERVER);

  const timeout=setTimeout(()=>{
    if(!running){
      clearInterval(loadInterval);
      wsConnecting=false;
      if(ws){try{ws.close();}catch(e){}ws=null;}
      setLoadStatus('Нет связи с сервером. Попробуй позже.',100);
      document.getElementById('loadBarFill').style.background='#e74c3c';
      setTimeout(()=>showMenu(),3000);
    }
  },8000);

  ws.onopen=()=>{
    clearInterval(loadInterval);
    document.getElementById('loadBarFill').style.width='92%';
    setLoadStatus('Авторизация');
    const name=document.getElementById('nameInput').value.trim()||'Player';
    ws.send(JSON.stringify({type:'join',name,skinId:selSkin}));
  };

  ws.onmessage=(e)=>{
    try{
      const msg=JSON.parse(e.data);

      if(msg.type==='joined'){
        clearTimeout(timeout);
        wsConnecting=false;
        document.getElementById('loadBarFill').style.width='100%';
        setLoadStatus('Готово!');

        if(msg.playerCount){document.getElementById('onlineNum').textContent=msg.playerCount;}

        pname=document.getElementById('nameInput').value.trim()||'Player';

        // Создаём локального игрока только для управления
        player={
          segs:[{x:WORLD/2,y:WORLD/2}],
          tAngle:0, angle:0, score:MIN_LEN,
          boosting:false, alive:true
        };
        camX=WORLD/2-W/2;
        camY=WORLD/2-H/2;

        setTimeout(()=>{
          document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
          document.getElementById('hud').style.display='block';
          document.getElementById('xpBarWrap').style.display='none';
          document.getElementById('questsBtn').style.display='none';
          document.getElementById('topBtn').style.display='none';
          document.getElementById('topPanel').style.display='none';
          document.getElementById('questsPanel').style.display='none';
          questsOpen=false;topPanelOpen=false;
          autopilotMode=false;
          document.getElementById('apBtn').classList.remove('active');
          running=true;
          surviveTimer=0;lastSurviveTick=performance.now();
          _xpFoodCounter=0;
          if(isMobile())showJoystick(true);
        },300);
      }

      if(msg.type==='world'){
        serverWorld=msg;
        if(msg.globalTop&&msg.globalTop.length)renderTopPanel(msg.globalTop);
        if(msg.playerCount){document.getElementById('onlineNum').textContent=msg.playerCount;}
        if(serverWorld.players){
          const me=serverWorld.players.find(p=>p.isMe);
          if(me&&me.segs&&me.segs.length>0){
            const sh=me.segs[0];
            camX+=(sh.x-W/2-camX)*0.12;
            camY+=(sh.y-H/2-camY)*0.12;
            if(player){player.segs=me.segs;player.score=me.score||player.score;}
          }
        }
        // ★ ФИКС БОНУСОВ: подбираем из серверных данных на клиенте
        if(msg.powerups&&player&&player.alive){
          pickupPowerupFromServer(msg.powerups);
        }
      }

      if(msg.type==='globalTop'){renderTopPanel(msg.data);}

      if(msg.type==='dead'){
        clearTimeout(timeout);
        const score=msg.score||0;
        document.getElementById('deathScore').textContent='Масса: '+score;
        document.getElementById('hud').style.display='none';
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
        document.getElementById('deathScreen').classList.add('active');
        running=false;
        renderRecords(score);
        trackQuest('reach_mass',score);
      }
    }catch(err){console.warn('WS msg error',err);}
  };

  ws.onerror=()=>{
    clearTimeout(timeout);
    clearInterval(loadInterval);
    wsConnecting=false;
    setLoadStatus('Ошибка подключения',100);
    document.getElementById('loadBarFill').style.background='#e74c3c';
    setTimeout(()=>showMenu(),3000);
  };

  ws.onclose=()=>{
    wsConnecting=false;
    ws=null;
    serverWorld=null;
    if(running){
      running=false;
      document.getElementById('hud').style.display='none';
      showMenu();
    }
  };
}

// ══════ INPUT ══════
let mx=400,my=300;
canvas.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
canvas.addEventListener('mousedown',e=>{if(e.button===0)boosting=true;});
canvas.addEventListener('mouseup',e=>{if(e.button===0)boosting=false;});
window.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ShiftLeft'){e.preventDefault();boosting=true;}
  if(e.code==='KeyA'&&running){autopilotMode=!autopilotMode;document.getElementById('apBtn').classList.toggle('active',autopilotMode);}
});
window.addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='ShiftLeft')boosting=false;});

// ══════ AUTOPILOT ══════
function runAutopilot(){
  if(!player||!player.segs||!player.segs.length)return;
  const h=player.segs[0];
  const fl=(serverWorld&&serverWorld.foods)||[];
  let best=Infinity,tgt=null;
  for(let i=0;i<fl.length;i+=2){const f=fl[i],dx=f.x-h.x,dy=f.y-h.y,d=dx*dx+dy*dy;if(d<best){best=d;tgt=f;}}
  if(tgt)player.tAngle=Math.atan2(tgt.y-h.y,tgt.x-h.x);
  if(serverWorld&&serverWorld.players){
    for(const p of serverWorld.players){if(p.isMe||!p.segs)continue;for(let i=0;i<Math.min(p.segs.length,15);i++){const s=p.segs[i],dx=s.x-h.x,dy=s.y-h.y;if(dx*dx+dy*dy<120*120){player.tAngle=Math.atan2(h.y-s.y,h.x-s.x)+(Math.random()-.5)*1.2;break;}}}
  }
  player.boosting=false;
}

// ══════ HUD ══════
function updHUD(){
  if(ws&&ws.readyState===WebSocket.OPEN&&player&&running){
    if(!autopilotMode){
      player.tAngle=Math.atan2(my-H/2,mx-W/2);
      const canBoost=player.score>MIN_LEN;
      player.boosting=boosting&&canBoost;
    } else {
      runAutopilot();
    }
    ws.send(JSON.stringify({type:'input',angle:player.tAngle,boost:player.boosting,devour:hasPU('big')}));
  }

  if(serverWorld){
    if(serverWorld.leaderboard){
      let h='';
      serverWorld.leaderboard.forEach((s,i)=>{h+=`<div class="lb-row${s.isMe?' me':''}"><span class="lb-rank">${i+1}</span><span class="lb-name">${s.name}</span><span class="lb-score">${s.score}</span></div>`;});
      document.getElementById('lbList').innerHTML=h;
    }
    const me=serverWorld.players?serverWorld.players.find(p=>p.isMe):null;
    const myScore=me?me.score:(player?player.score:0);
    const myRank=serverWorld.leaderboard?(serverWorld.leaderboard.findIndex(s=>s.isMe)+1||'?'):'?';
    document.getElementById('hudLen').textContent=myScore;
    document.getElementById('hudRank').textContent='#'+myRank;
    if(me){
      trackQuest('eat_food',0);
      const r=serverWorld.leaderboard?serverWorld.leaderboard.findIndex(s=>s.isMe)+1:99;
      if(r>=1&&r<=3&&serverWorld.leaderboard&&serverWorld.leaderboard.length>=4)trackQuest('top3',1);
    }
  }
}

function drawMM(){
  mctx.clearRect(0,0,108,108);const sc=108/WORLD;
  if(serverWorld){
    for(const f of(serverWorld.foods||[]).filter((_,i)=>i%5===0)){mctx.fillStyle='rgba(46,204,113,0.3)';mctx.fillRect(f.x*sc,f.y*sc,2,2);}
    for(const p of(serverWorld.players||[])){if(!p.segs||!p.segs.length)continue;const h=p.segs[0];mctx.beginPath();mctx.arc(h.x*sc,h.y*sc,p.isMe?4:3,0,Math.PI*2);mctx.fillStyle=p.isMe?'#f9ca24':'#00e5cc';mctx.fill();}
  }
}

// ══════ DRAW ══════
function drawBackground(cx,cy){
  ctx.fillStyle='#0d2b15';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(46,204,113,0.055)';ctx.lineWidth=1;
  for(let x=Math.floor(cx/CELL)*CELL;x<cx+W+CELL;x+=CELL){ctx.beginPath();ctx.moveTo(x-cx,0);ctx.lineTo(x-cx,H);ctx.stroke();}
  for(let y=Math.floor(cy/CELL)*CELL;y<cy+H+CELL;y+=CELL){ctx.beginPath();ctx.moveTo(0,y-cy);ctx.lineTo(W,y-cy);ctx.stroke();}
  ctx.strokeStyle='rgba(231,76,60,0.5)';ctx.lineWidth=8;ctx.strokeRect(-cx,-cy,WORLD,WORLD);
}

function drawFoodList(fl,cx,cy){
  for(const f of fl){
    const fx=f.x-cx,fy=f.y-cy;if(fx<-20||fx>W+20||fy<-20||fy>H+20)continue;
    if(f.p!==undefined)f.p+=.05;
    const pr=f.r*(f.size==='big'?1:.85+.15*Math.sin(f.p||0));
    ctx.beginPath();ctx.arc(fx,fy,pr,0,Math.PI*2);ctx.fillStyle=f.color||'#2ecc71';ctx.fill();
    ctx.beginPath();ctx.arc(fx-pr*.3,fy-pr*.3,pr*.27,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.28)';ctx.fill();
  }
}

function drawServerSnake(p,cx,cy){
  const segs=p.segs;if(!segs||segs.length<2)return;
  const hd0=segs[0],hsx=hd0.x-cx,hsy=hd0.y-cy;
  if(hsx<-500||hsx>W+500||hsy<-500||hsy>H+500)return;
  const sk=SKINS_DATA[p.skinId%SKINS_DATA.length]||SKINS_DATA[0];
  const r=6+(Math.min(p.score||10,1000)/1000)*22;
  if(p.boosting)ctx.globalAlpha=0.72;
  for(let i=segs.length-1;i>=1;i--){
    const s=segs[i],sx=s.x-cx,sy=s.y-cy;
    if(sx<-150||sx>W+150||sy<-150||sy>H+150)continue;
    const t=i/segs.length;
    ctx.beginPath();ctx.arc(sx,sy,r*(.72+.28*(1-t)),0,Math.PI*2);
    ctx.fillStyle=i%2===0?sk.b[0]:sk.b[1];ctx.fill();
  }
  ctx.globalAlpha=1;
  const hx=hd0.x-cx,hy=hd0.y-cy;
  if(p.isMe){ctx.beginPath();ctx.arc(hx,hy,r+9,0,Math.PI*2);ctx.fillStyle='rgba(57,255,20,0.11)';ctx.fill();}
  ctx.beginPath();ctx.arc(hx,hy,r,0,Math.PI*2);ctx.fillStyle=sk.h;ctx.fill();
  const ang=segs.length>1?Math.atan2(segs[0].y-segs[1].y,segs[0].x-segs[1].x):0;
  [ang-.48,ang+.48].forEach(a=>{
    const ex=hx+Math.cos(a)*r*.5,ey=hy+Math.sin(a)*r*.5,er=r*.33;
    ctx.beginPath();ctx.arc(ex,ey,er,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.beginPath();ctx.arc(ex+Math.cos(ang)*er*.5,ey+Math.sin(ang)*er*.5,er*.5,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();
  });
  ctx.font='bold '+(9+r)+'px Nunito';ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(p.name,hx+1,hy-r-8+1);
  ctx.fillStyle=p.isMe?'#f9ca24':'#fff';ctx.fillText(p.name,hx,hy-r-8);
}

function draw(cx,cy){
  drawBackground(cx,cy);
  if(serverWorld){
    drawFoodList(serverWorld.foods||[],cx,cy);
    for(const p of(serverWorld.players||[]))drawServerSnake(p,cx,cy);
  }
  drawPowerups(cx,cy);
}

// ══════ LOOP ══════
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/16,3);lastT=ts;
  if(running)updHUD();
  draw(camX,camY);
  if(running){
    drawMM();
    const now=performance.now();
    spawnPowerups(now);
    // ★ ФИКС: бонусы подбираются всегда (не только в локальном режиме!)
    if(player&&player.alive){
      pickupPowerup(player,now);
      applyMagnet(player);
    }
    updatePowerup(now);
    if(player&&player.alive&&now-lastSurviveTick>=1000){
      surviveTimer++;lastSurviveTick=now;trackQuest('survive_time',1);
    }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ══════ POWERUPS ══════
// Бонусы живут ТОЛЬКО на клиенте (визуал + подбор). 
// Позиции генерируются локально синхронно (seed по времени).
const PU_TYPES=[
  {type:'magnet',  name:'Магнит',    color:'#e84393',dur:8000, w:0.33,icon:'🧲'},
  {type:'speed',   name:'Молния',    color:'#fdcb6e',dur:7000, w:0.34,icon:'⚡'},
  {type:'big',     name:'Пожиратель',color:'#ff6b9d',dur:6000, w:0.33,icon:'🔥'},
];
let powerups=[],activePU=null,lastPUSpawn=0;
const MAX_PU=8,PU_INT=4000;

function mkPU(){
  const tw=PU_TYPES.reduce((a,t)=>a+t.w,0);
  let r=Math.random()*tw,idx=0;
  for(let i=0;i<PU_TYPES.length;i++){r-=PU_TYPES[i].w;if(r<=0){idx=i;break;}}
  const t=PU_TYPES[idx];
  return{x:200+Math.random()*(WORLD-400),y:200+Math.random()*(WORLD-400),...t,p:0,id:Math.random()};
}

function spawnPowerups(now){
  if(now-lastPUSpawn>PU_INT&&powerups.length<MAX_PU){
    powerups.push(mkPU());lastPUSpawn=now;
  }
}

// ★ ГЛАВНЫЙ ФИКС БОНУСОВ: используем позицию из serverWorld для игрока
function pickupPowerup(sn,now){
  // Берём позицию головы из серверных данных (самые актуальные координаты)
  let hx,hy,r;
  if(serverWorld){
    const me=serverWorld.players?serverWorld.players.find(p=>p.isMe):null;
    if(me&&me.segs&&me.segs.length){
      hx=me.segs[0].x;hy=me.segs[0].y;
      r=6+(Math.min(me.score||10,1000)/1000)*22;
    }
  }
  // Фолбек на локального игрока
  if(hx===undefined&&sn.segs&&sn.segs.length){
    hx=sn.segs[0].x;hy=sn.segs[0].y;r=16;
  }
  if(hx===undefined)return;

  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    const dx=hx-p.x,dy=hy-p.y;
    const pickR=(r||16)+28; // увеличенный радиус подбора
    if(dx*dx+dy*dy<pickR*pickR){
      activePU={...p,endsAt:now+p.dur};
      const el=document.getElementById('activePowerup');
      el.style.display='flex';
      el.style.borderColor=p.color;
      document.getElementById('puName').textContent=p.icon+' '+p.name;
      showToast(p.icon+' '+p.name+' активирован!',p.color);
      trackQuest('collect_powerup',1);
      powerups.splice(i,1);
      // Монеты за подбор
      essence=Math.min(9999,essence+5);syncEss();
    }
  }
}

// Фолбек — если сервер когда-то будет слать powerups
function pickupPowerupFromServer(srvPowerups){
  // пока не используется, заглушка для будущего
}

function updatePowerup(now){
  if(!activePU)return;
  const left=Math.max(0,activePU.endsAt-now);
  document.getElementById('puTimer').textContent=Math.ceil(left/1000)+'s';
  if(left<=0){activePU=null;document.getElementById('activePowerup').style.display='none';}
}
function hasPU(type){return activePU&&activePU.type===type;}

function applyMagnet(sn){
  if(!hasPU('magnet')||!serverWorld||!serverWorld.foods)return;
  // Магнит визуально притягивает еду на клиенте
  let hx,hy;
  if(sn.segs&&sn.segs.length){hx=sn.segs[0].x;hy=sn.segs[0].y;}
  else return;
  for(const f of serverWorld.foods){
    const dx=hx-f.x,dy=hy-f.y,d2=dx*dx+dy*dy;
    if(d2<120*120&&d2>1){const d=Math.sqrt(d2);f.x+=dx/d*18;f.y+=dy/d*18;}
  }
}

function drawPUIcon(c,type,col,x,y,s){
  c.save();c.translate(x,y);
  if(type==='magnet'){c.strokeStyle='#fff';c.lineWidth=s*0.35;c.lineCap='round';c.beginPath();c.arc(0,0,s*0.7,Math.PI,0,false);c.stroke();c.strokeStyle='#f00';c.lineWidth=s*0.28;c.beginPath();c.moveTo(-s*0.7,0);c.lineTo(-s*0.7,s*0.55);c.stroke();c.strokeStyle='#00f';c.beginPath();c.moveTo(s*0.7,0);c.lineTo(s*0.7,s*0.55);c.stroke();}
  else if(type==='shield'){c.fillStyle='#fff';c.beginPath();c.moveTo(0,-s);c.lineTo(s*0.8,-s*0.4);c.lineTo(s*0.8,s*0.2);c.quadraticCurveTo(s*0.8,s*0.9,0,s);c.quadraticCurveTo(-s*0.8,s*0.9,-s*0.8,s*0.2);c.lineTo(-s*0.8,-s*0.4);c.closePath();c.fill();}
  else if(type==='speed'){c.fillStyle='#fff';c.beginPath();c.moveTo(s*0.2,-s);c.lineTo(-s*0.3,0);c.lineTo(s*0.1,0);c.lineTo(-s*0.2,s);c.lineTo(s*0.3,0);c.lineTo(-s*0.1,0);c.closePath();c.fill();}
  else if(type==='ghost'){c.fillStyle='rgba(255,255,255,0.85)';c.beginPath();c.arc(0,-s*0.2,s*0.7,Math.PI,0,false);c.lineTo(s*0.7,s*0.7);c.quadraticCurveTo(s*0.35,s*0.45,0,s*0.7);c.quadraticCurveTo(-s*0.35,s*0.45,-s*0.7,s*0.7);c.lineTo(-s*0.7,-s*0.2);c.closePath();c.fill();}
  else if(type==='big'){
    c.fillStyle='#fff';c.font='bold '+(s*1.3)+'px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText('🔥',0,0);
  }
  c.restore();
}

function drawPowerups(cx,cy){
  for(const p of powerups){
    const px=p.x-cx,py=p.y-cy;
    if(px<-60||px>W+60||py<-60||py>H+60)continue;
    p.p=(p.p||0)+0.04;
    const pulse=1+0.15*Math.sin(p.p*3),r=18*pulse;
    // Свечение
    ctx.beginPath();ctx.arc(px,py,r+12,0,Math.PI*2);
    ctx.fillStyle=p.color+'22';ctx.fill();
    ctx.beginPath();ctx.arc(px,py,r+6,0,Math.PI*2);
    ctx.fillStyle=p.color+'44';ctx.fill();
    // Основной круг
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fillStyle=p.color+'cc';ctx.fill();
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);
    ctx.strokeStyle=p.color;ctx.lineWidth=2.5;ctx.stroke();
    // Иконка
    drawPUIcon(ctx,p.type,p.color,px,py,r*0.55);
  }
}

}

const joystickWrap=document.getElementById('joystickWrap');

const joystickKnob=document.getElementById('joystickKnob');
const boostBtn=document.getElementById('boostBtn');
let joyActive=false,joyId=null,joyBaseX=0,joyBaseY=0;
const JOY_MAX=52;
function isMobile(){return('ontouchstart' in window)||navigator.maxTouchPoints>0;}
function showJoystick(show){joystickWrap.style.display=show?'block':'none';boostBtn.style.display=show?'flex':'none';}
joystickBase.addEventListener('touchstart',e=>{if(!running)return;const t=e.changedTouches[0];joyId=t.identifier;joyActive=true;const rect=joystickBase.getBoundingClientRect();joyBaseX=rect.left+rect.width/2;joyBaseY=rect.top+rect.height/2;},{passive:true});
window.addEventListener('touchmove',e=>{
  if(!joyActive)return;e.preventDefault();
  for(const t of e.changedTouches){if(t.identifier!==joyId)continue;const dx=t.clientX-joyBaseX,dy=t.clientY-joyBaseY,dist=Math.sqrt(dx*dx+dy*dy),cl=Math.min(dist,JOY_MAX),nx=dist>0?dx/dist*cl:0,ny=dist>0?dy/dist*cl:0;joystickKnob.style.transform=`translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;if(player&&player.alive)player.tAngle=Math.atan2(dy,dx);mx=W/2+dx*10;my=H/2+dy*10;}
},{passive:false});
window.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===joyId){joyActive=false;joystickKnob.style.transform='translate(-50%,-50%)';}}}),{passive:true};

boostBtn.addEventListener('touchend',e=>{e.preventDefault();boosting=false;},{passive:false});

canvas.addEventListener('touchstart',()=>boosting=true,{passive:true});

// ══════ XP ══════
const LEVELS=[{xp:0},{xp:50},{xp:150},{xp:350},{xp:700},{xp:1200},{xp:2000},{xp:3500},{xp:6000},{xp:10000}];
let playerXP=parseInt(localStorage.getItem('dvx_xp')||'0');
function getLevel(xp){let lv=0;for(let i=0;i<LEVELS.length;i++)if(xp>=LEVELS[i].xp)lv=i;return lv;}
function addXP(amount){playerXP=Math.min(playerXP+amount,99999);localStorage.setItem('dvx_xp',playerXP);updateXPBar();}
function updateXPBar(){
  const lv=getLevel(playerXP);const cur=playerXP-LEVELS[lv].xp;
  const need=lv>=LEVELS.length-1?1:(LEVELS[lv+1].xp-LEVELS[lv].xp);
  const fill=document.getElementById('xpBarFill');if(fill)fill.style.width=Math.min(100,(cur/need)*100)+'%';
  const ln=document.getElementById('lvlNum');if(ln)ln.textContent=lv+1;
  const xc=document.getElementById('xpCur');if(xc)xc.textContent=cur;
  const xn=document.getElementById('xpNext');if(xn)xn.textContent=lv>=LEVELS.length-1?'MAX':need;
}
updateXPBar();

// ══════ QUESTS ══════
const QUEST_DEFS=[
  {id:'eat_food',name:'Съешь 100 еды',goal:100,reward:273,icon:'🍎'},
  {id:'reach_mass',name:'Набери 500 массы',goal:500,reward:289,icon:'📈'},
  {id:'collect_powerup',name:'Подбери 2 бонуса',goal:2,reward:261,icon:'⚡'},
  {id:'survive_time',name:'Выживи 3 минуты',goal:180,reward:304,icon:'⏱'},
  {id:'top3',name:'Займи топ-3 в раунде',goal:1,reward:347,icon:'🏆'},
  {id:'eat_500',name:'Съешь 500 еды',goal:500,reward:412,icon:'🍎'},
];
function getTodayKey(){return'dvx_q_'+new Date().toDateString();}
function loadQuests(){const k=getTodayKey(),s=localStorage.getItem(k);if(s)return JSON.parse(s);const q=[...QUEST_DEFS].sort(()=>Math.random()-.5).slice(0,3).map(q=>({...q,progress:0,done:false}));localStorage.setItem(k,JSON.stringify(q));return q;}
function saveQuests(){localStorage.setItem(getTodayKey(),JSON.stringify(dailyQuests));}
let dailyQuests=loadQuests();
function trackQuest(id,amount){
  if(amount===0)return;
  let ch=false;
  for(const q of dailyQuests){
    if(q.id===id&&!q.done){
      q.progress=Math.min(q.goal,q.progress+amount);
      if(q.progress>=q.goal){q.done=true;showToast(q.icon+' Задание выполнено! +'+q.reward+'🪙','#f9ca24');essence=Math.min(9999,essence+q.reward);syncEss();addXP(q.reward);}
      ch=true;
    }
  }
  if(ch){saveQuests();renderQuests();}
}
function renderQuests(){
  const list=document.getElementById('questsList');if(!list)return;
  list.innerHTML=dailyQuests.map(q=>`<div class="quest-item"><div class="quest-name">${q.icon} ${q.name}</div><div class="quest-bar-bg"><div class="quest-bar-fill" style="width:${Math.min(100,(q.progress/q.goal)*100)}%"></div></div><div class="quest-prog"><span>${q.progress}/${q.goal}</span><span class="${q.done?'quest-done':''}">${q.done?'✅ +'+q.reward+'🪙':'🪙 '+q.reward}</span></div></div>`).join('');
  const badge=document.getElementById('questsBadge');if(badge){const d=dailyQuests.filter(q=>q.done).length;if(d>0){badge.style.display='flex';badge.textContent=d;}else badge.style.display='none';}
}

  list.innerHTML=globalTopData.map((r,i)=>{
    const m=medals[i];const rowClass=m?' '+m.color:'';
    const medal=m?`<div class="top-medal">${m.emoji}<span class="top-medal-num" style="color:${m.color==='gold'?'#f9ca24':m.color==='silver'?'#c0c0c0':'#cd7f32'}">${m.num}</span></div>`:`<div class="top-medal" style="font-family:'Fredoka One',cursive;font-size:13px;color:rgba(255,255,255,0.3);width:28px;text-align:center;">${i+1}</div>`;
    return`<div class="top-row${rowClass}">${medal}<span class="top-name">${r.name}</span><span class="top-score">${r.score}</span></div>`;
  }).join('');
}
function toggleTopPanel(){
